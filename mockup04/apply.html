<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply | INVEON</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-container">
      <a href="./index.html" class="logo-link">INVEON.</a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="./index.html" class="nav-link" id="nav-home">Think in English</a></li>
          <li><a href="./curriculum.html" class="nav-link" id="nav-curriculum">Curriculum</a></li>
          <li><a href="./apply.html" class="nav-link active" id="nav-apply">Apply</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- CONTENT -->
  <section class="section">
    <div class="container">
      <div class="apply-box">
        <h2 style="font-size: 3rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 3rem; text-align: center;">간편 상담 예약</h2>
        <p style="color: var(--color-text-muted); text-align: center; margin-bottom: 3rem;">복잡한 입력 절차를 최소화했습니다. 성함과 전화번호를 남겨주시면 원장단이 직접 전화를 드려 상세히 상담을 도와드립니다.</p>

        <form id="minimal-apply-form">
          <input type="text" id="parent-name" class="form-input-minimal" placeholder="성함" required>
          <input type="tel" id="phone" class="form-input-minimal" placeholder="전화번호" required>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 99px; padding: 1rem 0; font-size: 1rem;">상담 전화 신청</button>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-container">
      <div>
        <h4 class="footer-heading">INVEON</h4>
        <p style="max-width: 250px;">뇌과학 설계 나선형 단어 복습 및 라이브러리 연계 어학 아카데미</p>
      </div>
      <div>
        <h4 class="footer-heading">Programs</h4>
        <ul class="footer-links">
          <li><a href="./curriculum.html">Prep Core</a></li>
          <li><a href="./curriculum.html">Literature Club</a></li>
        </ul>
      </div>
      <div>
        <h4 class="footer-heading">Contact</h4>
        <p>📍 인천 연수구 컨벤시아대로 42번길 29 에이스프라자 203호</p>
        <p>📞 032-833-3642</p>
        <p style="margin-top: 1rem;"><a href="/mockups" style="color: var(--color-text-main); font-weight: 600;">← 시안 갤러리로 돌아가기</a></p>
      </div>
    </div>
  </footer>

  <script src="./main.js"></script>
  <script>
    document.getElementById('minimal-apply-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const bookingData = {
        type: 'Apple Style Minimal',
        parentName: document.getElementById('parent-name').value,
        phone: document.getElementById('phone').value,
        studentName: '미정 (유선 확인 예정)',
        grade: '미정 (유선 확인 예정)',
        date: '콜백 상담 대기',
        time: '영업일 내 순차 연락',
        createdAt: new Date().toISOString()
      };

      let reservations = JSON.parse(localStorage.getItem('iea_reservations') || '[]');
      reservations.push(bookingData);
      localStorage.setItem('iea_reservations', JSON.stringify(reservations));

      fetch('/api/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(reservations)
      })
      .then(res => res.json())
      .catch(err => console.error(err));

      alert('콜백 상담 예약이 정상 접수되었습니다. 빠른 시간 내에 연락해 드리겠습니다.');
      window.location.href = './index.html';
    });
  </script>
</body>
</html>
